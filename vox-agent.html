<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="VOX">
    <meta name="theme-color" content="#050505">
    <title>VOX | AI Voice Agent</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;600&display=swap"
        rel="stylesheet">
    <!-- ElevenLabs official convai widget — handles all audio, VAD, and interruption natively -->
    <script src="https://elevenlabs.io/convai-widget/index.js" async type="text/javascript"></script>
    <style>
        :root {
            --bg: #050505;
            --accent: #00f2ff;
            --accent-glow: rgba(0, 242, 255, 0.4);
            --secondary: #ff00ea;
            --secondary-glow: rgba(255, 0, 234, 0.4);
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);

            body.light-mode {
                --bg: #ffffff;
                --accent: #0022cc;
                --accent-glow: rgba(0, 34, 204, 0.1);
                --secondary: #6510b5;
                --secondary-glow: rgba(101, 16, 181, 0.1);
                --text-main: #000000;
                --text-dim: #444444;
                --glass: rgba(0, 0, 0, 0.05);
                --glass-border: rgba(0, 0, 0, 0.15);
                --danger: #cc0000;
            }

            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
                font-family: 'Inter', sans-serif;
                -webkit-tap-highlight-color: transparent;
                -webkit-touch-callout: none;
            }

            h1,
            h2,
            h3,
            .vox-logo {
                font-family: 'Space Grotesk', sans-serif;
            }

            body {
                background-color: var(--bg);
                color: var(--text-main);
                min-height: 100vh;
                min-height: -webkit-fill-available;
                display: flex;
                flex-direction: column;
                overflow: hidden;
                position: relative;
                padding-top: env(safe-area-inset-top);
                padding-bottom: env(safe-area-inset-bottom);
                padding-left: env(safe-area-inset-left);
                padding-right: env(safe-area-inset-right);
            }

            /* Native Canvas Background */
            #bgCanvas {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                z-index: -2;
                pointer-events: none;
            }

            /* Nav Controls */
            .app-nav {
                position: fixed;
                top: 2rem;
                left: 2rem;
                display: flex;
                gap: 0.5rem;
                z-index: 50;
            }

            .nav-btn {
                width: 40px;
                height: 40px;
                border-radius: 50%;
                background: var(--glass);
                border: 1px solid var(--glass-border);
                color: var(--text-main);
                display: flex;
                align-items: center;
                justify-content: center;
                cursor: pointer;
                transition: 0.3s;
                backdrop-filter: blur(5px);
            }

            .nav-btn:hover {
                background: var(--accent);
                color: var(--bg);
                transform: scale(1.1);
            }

            /* Animated Background */
            .bg-glow {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                z-index: -1;
                background:
                    radial-gradient(circle at 20% 30%, var(--accent-glow) 0%, transparent 40%),
                    radial-gradient(circle at 80% 70%, var(--secondary-glow) 0%, transparent 40%);
                filter: blur(80px);
                animation: bg-move 20s infinite alternate ease-in-out;
            }

            @keyframes bg-move {
                0% {
                    transform: scale(1);
                }

                100% {
                    transform: scale(1.2) translate(5%, 5%);
                }
            }

            /* Header */
            header {
                padding: 1.25rem 1.5rem;
                display: flex;
                justify-content: space-between;
                align-items: center;
                backdrop-filter: blur(10px);
                z-index: 10;
                flex-shrink: 0;
            }

            .vox-logo {
                font-size: clamp(1.8rem, 6vw, 3rem);
                font-weight: 800;
                letter-spacing: -1px;
                background: linear-gradient(to right, var(--accent), var(--secondary));
                background-clip: text;
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                position: relative;
                line-height: 1.1;
                padding-bottom: 12px;
            }

            .vox-logo::after {
                content: 'VOICE AGENT';
                position: absolute;
                bottom: -2px;
                left: 2px;
                font-size: 0.55rem;
                letter-spacing: 3px;
                -webkit-text-fill-color: var(--text-dim);
                white-space: nowrap;
            }

            /* Main Config Panel */
            .config-overlay {
                position: fixed;
                inset: 0;
                background: rgba(0, 0, 0, 0.8);
                backdrop-filter: blur(20px);
                display: flex;
                align-items: center;
                justify-content: center;
                z-index: 100;
                transition: opacity 0.5s, visibility 0.5s;
            }

            .config-overlay.hidden {
                opacity: 0;
                visibility: hidden;
                pointer-events: none;
            }

            .config-card {
                background: var(--glass);
                border: 1px solid var(--glass-border);
                padding: 3rem;
                border-radius: 24px;
                width: 100%;
                max-width: 500px;
                box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            }

            .config-card h2 {
                font-size: 2rem;
                margin-bottom: 2rem;
                text-align: center;
            }

            .input-box {
                margin-bottom: 1.5rem;
            }

            .input-box label {
                display: block;
                font-size: 0.75rem;
                text-transform: uppercase;
                letter-spacing: 2px;
                color: var(--text-dim);
                margin-bottom: 0.5rem;
            }

            .input-box input {
                width: 100%;
                padding: 1rem;
                background: var(--glass);
                border: 1px solid var(--glass-border);
                border-radius: 12px;
                color: var(--text-main);
                font-size: 16px; /* prevents iOS auto-zoom on focus */
                outline: none;
                transition: 0.3s;
                -webkit-appearance: none;
                appearance: none;
            }

            .input-box input:focus {
                border-color: var(--accent);
                background: rgba(128, 128, 128, 0.1);
            }

            .btn-launch {
                width: 100%;
                padding: 1.2rem;
                background: linear-gradient(45deg, var(--accent), var(--secondary));
                border: none;
                border-radius: 12px;
                color: white;
                font-weight: 700;
                font-size: 1.1rem;
                cursor: pointer;
                transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
                margin-top: 1rem;
            }

            .btn-launch:hover {
                transform: translateY(-5px) scale(1.02);
                box-shadow: 0 10px 30px var(--accent-glow);
            }

            /* Interface Content */
            .workspace {
                flex: 1;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                padding: 0 1.5rem 2rem 1.5rem;
                height: calc(100dvh - 80px);
                touch-action: none;
            }

            /* Core Interaction Area */
            .interaction-zone {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                position: relative;
            }

            /* ElevenLabs Widget Container */
            .widget-centered-container {
                display: none;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                width: 100%;
                height: 100%;
                position: relative;
                flex: 1; /* Take up all available space to ensure centering */
            }

            .widget-frame {
                background: var(--glass);
                border: 1px solid var(--glass-border);
                border-radius: 50%;
                padding: 40px;
                display: flex;
                align-items: center;
                justify-content: center;
                box-shadow: 0 0 80px var(--accent-glow);
                backdrop-filter: blur(10px);
                transition: transform 0.3s ease;
            }

            .widget-frame:hover {
                transform: scale(1.02);
            }

            elevenlabs-convai {
                margin: 0 auto;
                z-index: 5;
            }


            /* Sidebar - Transcript */
            .sidebar {
                background: var(--glass);
                border: 1px solid var(--glass-border);
                border-radius: 24px;
                display: flex;
                flex-direction: column;
                overflow: hidden;
                backdrop-filter: blur(10px);
            }

            .sidebar-header {
                padding: 1.5rem;
                border-bottom: 1px solid var(--glass-border);
                display: flex;
                justify-content: space-between;
                align-items: center;
            }

            .sidebar-header h3 {
                font-size: 0.9rem;
                letter-spacing: 2px;
                color: var(--text-dim);
            }

            .transcript-feed {
                flex: 1;
                overflow-y: auto;
                padding: 1.5rem;
                display: flex;
                flex-direction: column;
                gap: 1.5rem;
            }

            .msg-bubble {
                max-width: 90%;
                padding: 1rem;
                border-radius: 16px;
                font-size: 0.95rem;
                line-height: 1.5;
                position: relative;
            }

            .msg-agent {
                align-self: flex-start;
                background: rgba(255, 255, 255, 0.03);
                border: 1px solid var(--glass-border);
                border-bottom-left-radius: 4px;
            }

            .msg-user {
                align-self: flex-end;
                background: linear-gradient(135deg, rgba(0, 242, 255, 0.1), rgba(255, 0, 234, 0.1));
                border: 1px solid rgba(0, 242, 255, 0.2);
                border-bottom-right-radius: 4px;
                color: var(--accent);
            }

            .msg-speaker {
                font-size: 0.65rem;
                text-transform: uppercase;
                letter-spacing: 1px;
                margin-bottom: 0.4rem;
                display: block;
                opacity: 0.5;
            }

            /* Controls Area */
            .vox-controls {
                padding: 1.5rem;
                border-top: 1px solid var(--glass-border);
                display: flex;
                gap: 1rem;
            }

            .ctrl-btn {
                flex: 1;
                padding: 0.8rem;
                border-radius: 12px;
                border: 1px solid var(--glass-border);
                background: transparent;
                color: white;
                cursor: pointer;
                transition: 0.3s;
                font-size: 0.8rem;
                font-weight: 600;
            }

            .btn-stop {
                color: var(--danger);
                border-color: rgba(255, 77, 77, 0.3);
            }

            .btn-stop:hover {
                background: rgba(255, 77, 77, 0.1);
            }

            .btn-copy:hover {
                background: rgba(255, 255, 255, 0.05);
            }

            /* Audio Waveform */
            .visualizer {
                display: flex;
                align-items: center;
                gap: 3px;
                height: 30px;
            }

            .bar {
                width: 3px;
                height: 100%;
                background: var(--accent);
                border-radius: 2px;
                transition: height 0.1s ease;
            }

            /* Mobile Adjustments */
            @media (max-width: 768px) {
                .orb-container {
                    width: 240px;
                    height: 240px;
                }
                .orb {
                    width: 150px;
                    height: 150px;
                    /* Bigger tap target for fingers */
                    min-width: 44px;
                    min-height: 44px;
                }
                .vox-status {
                    font-size: 1rem;
                    letter-spacing: 3px;
                    margin-top: 2rem;
                }
                .config-card {
                    padding: 2rem 1.5rem;
                    border-radius: 20px;
                    margin: 1rem;
                }
                .ctrl-btn {
                    padding: 1rem;
                    min-height: 44px;
                }
                header {
                    padding: 1rem 1.25rem;
                }
            }
            /* Pulse ring scaling for smaller orb */
            @media (max-width: 768px) {
                @keyframes orb-pulse {
                    0% { width: 150px; height: 150px; opacity: 1; }
                    100% { width: 320px; height: 320px; opacity: 0; }
                }
            }
            }

            /* Scrollbar */
            ::-webkit-scrollbar {
                width: 4px;
            }

            ::-webkit-scrollbar-track {
                background: transparent;
            }

            ::-webkit-scrollbar-thumb {
                background: var(--glass-border);
                border-radius: 10px;
            }
    </style>
</head>

<body>

    <canvas id="bgCanvas"></canvas>
    <div class="bg-glow"></div>

    <header>
        <div class="vox-logo" id="headerTitle">VOX</div>
        <div id="visualizer" class="visualizer" style="opacity: 0;">
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
        </div>
        <div>
            <button class="ctrl-btn" id="themeToggleBtn"
                style="flex: initial; width: auto; padding: 0.5rem 1rem; margin-right: 10px;">☀</button>
            <button class="ctrl-btn" id="reconfigureBtn"
                style="flex: initial; width: auto; padding: 0.5rem 1rem;">CONFIG</button>
        </div>
    </header>

    <div id="configOverlay" class="config-overlay">
        <div class="config-card">
            <h2>INITIALIZE VOX</h2>
            <div class="input-box">
                <label>Assistant Title</label>
                <input type="text" id="agentTitle" placeholder="e.g. Sales Assistant">
            </div>
            <div class="input-box" style="display: none;">
                <label>ElevenLabs API Key</label>
                <input type="password" id="apiKey" value="8f0c236b58aebe5adf385614f97a00c8020ccc56139338ab4af5a176987906c6">
            </div>
            <div class="input-box">
                <label>Agent ID</label>
                <input type="text" id="agentId" placeholder="agent_...">
            </div>
            <button id="launchBtn" class="btn-launch">SYSTEM START</button>
            <p
                style="font-size: 0.7rem; color: var(--text-dim); text-align: center; margin-top: 1.5rem; letter-spacing: 1px;">
                DIRECT CLIENT-SIDE SECURE HANDSHAKE</p>
        </div>
    </div>

    <main class="workspace">
        <section class="interaction-zone" style="width: 100%; height: 100%; flex: 1;">
            <div id="widgetContainer" class="widget-centered-container">
                <div class="widget-frame">
                    <elevenlabs-convai id="elWidget" variant="full"></elevenlabs-convai>
                </div>
                <div id="sessionControls" style="margin-top:2.5rem; width:100%; max-width:300px;">
                    <button id="endBtn" class="ctrl-btn btn-stop" style="width:100%; letter-spacing: 2px;">TERMINATE SESSION</button>
                </div>
            </div>
        </section>
    </main>

    <script>
        const API_KEY_INPUT    = document.getElementById('apiKey');
        const AGENT_ID_INPUT   = document.getElementById('agentId');
        const AGENT_TITLE_INPUT= document.getElementById('agentTitle');
        const LAUNCH_BTN       = document.getElementById('launchBtn');
        const CONFIG_OVERLAY   = document.getElementById('configOverlay');
        const RECONFIG_BTN     = document.getElementById('reconfigureBtn');
        const THEME_TOGGLE_BTN = document.getElementById('themeToggleBtn');
        const HEADER_TITLE     = document.getElementById('headerTitle');
        const WIDGET_CONTAINER = document.getElementById('widgetContainer');
        const EL_WIDGET        = document.getElementById('elWidget');
        const END_BTN          = document.getElementById('endBtn');

        const params = new URLSearchParams(window.location.search);
        if (params.has('agentId')) AGENT_ID_INPUT.value = params.get('agentId');
        if (params.has('apiKey'))  API_KEY_INPUT.value  = params.get('apiKey');
        if (params.has('title'))   AGENT_TITLE_INPUT.value = params.get('title');

        THEME_TOGGLE_BTN.addEventListener('click', () => {
            document.body.classList.toggle('light-mode');
            THEME_TOGGLE_BTN.innerText = document.body.classList.contains('light-mode') ? '☾' : '☀';
        });

        // ── Launch Session ──────────────────────────────────────────────────────
        LAUNCH_BTN.addEventListener('click', async () => {
            const apiKey     = API_KEY_INPUT.value.trim();
            const agentId    = AGENT_ID_INPUT.value.trim();
            const agentTitle = AGENT_TITLE_INPUT.value.trim() || 'VOX';

            if (!apiKey || !agentId) return alert('API Key and Agent ID required.');

            LAUNCH_BTN.innerText = 'ESTABLISHING...';

            try {
                // Get signed URL
                const res = await fetch(
                    `https://api.elevenlabs.io/v1/convai/conversation/get-signed-url?agent_id=${agentId}`,
                    { headers: { 'xi-api-key': apiKey } }
                );
                if (!res.ok) throw new Error('AUTH_FAILED');
                const { signed_url } = await res.json();

                // Update UI
                HEADER_TITLE.innerText = agentTitle;
                document.title = `${agentTitle} | AI Voice Agent`;
                CONFIG_OVERLAY.classList.add('hidden');
                WIDGET_CONTAINER.style.display = 'flex';

                // Set attributes on the widget
                EL_WIDGET.setAttribute('agent-id', agentId);
                EL_WIDGET.setAttribute('signed-url', signed_url);
                EL_WIDGET.setAttribute('avatar-orb-color-1', '#00F2FF');
                EL_WIDGET.setAttribute('avatar-orb-color-2', '#bf00ff');

                // Auto-click the widget's start button
                autoStartWidget();

            } catch (err) {
                console.error(err);
                alert('Failed to connect. Check credentials.');
                CONFIG_OVERLAY.classList.remove('hidden');
                LAUNCH_BTN.innerText = 'SYSTEM START';
            }
        });

        // Poll for the widget button and click it to ensure mic is ACTIVE
        function autoStartWidget() {
            let attempts = 0;
            const poll = setInterval(() => {
                attempts++;
                
                // The ElevenLabs widget is a Web Component that likely uses Shadow DOM
                const btn = EL_WIDGET.shadowRoot 
                    ? EL_WIDGET.shadowRoot.querySelector('button') 
                    : EL_WIDGET.querySelector('button');

                if (btn) {
                    clearInterval(poll);
                    console.log('[VOX] Start button found, activating session...');
                    // Use a slight timeout to ensure widget is ready for click
                    setTimeout(() => {
                        btn.click();
                        console.log('[VOX] Session auto-started (Mic active)');
                    }, 200);
                } else if (attempts > 60) {
                    clearInterval(poll);
                    console.log('[VOX] Start button not found after 6s - please start manually');
                }
            }, 100);
        }

        RECONFIG_BTN.addEventListener('click', () => {
            CONFIG_OVERLAY.classList.remove('hidden');
            LAUNCH_BTN.innerText = 'SYSTEM START';
        });

        END_BTN.addEventListener('click', () => {
            EL_WIDGET.removeAttribute('signed-url');
            EL_WIDGET.removeAttribute('agent-id');
            WIDGET_CONTAINER.style.display = 'none';
            CONFIG_OVERLAY.classList.remove('hidden');
            LAUNCH_BTN.innerText = 'SYSTEM START';
            HEADER_TITLE.innerText = 'VOX';
            document.title = 'VOX | AI Voice Agent';
        });

        // ── Canvas Particle Background ──────────────────────────────────────────
        const canvas = document.getElementById('bgCanvas');
        const ctx = canvas.getContext('2d');
        let width, height, particles;

        function initCanvas() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            particles = Array.from({ length: 60 }, () => ({
                x: Math.random() * width,
                y: Math.random() * height,
                vx: (Math.random() - 0.5) * 0.5,
                vy: (Math.random() - 0.5) * 0.5,
                radius: Math.random() * 2 + 1
            }));
        }

        function drawParticles() {
            ctx.clearRect(0, 0, width, height);
            const dark = !document.body.classList.contains('light-mode');
            ctx.fillStyle   = dark ? 'rgba(0,242,255,.5)'  : 'rgba(0,34,204,.8)';
            ctx.strokeStyle = dark ? 'rgba(0,242,255,.1)'  : 'rgba(0,34,204,.25)';
            particles.forEach((p, i) => {
                p.x += p.vx; p.y += p.vy;
                if (p.x < 0 || p.x > width)  p.vx *= -1;
                if (p.y < 0 || p.y > height) p.vy *= -1;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI*2); ctx.fill();
                for (let j = i+1; j < particles.length; j++) {
                    const q = particles[j], d = Math.hypot(p.x-q.x, p.y-q.y);
                    if (d < 150) {
                        ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(q.x,q.y);
                        ctx.globalAlpha = 1-d/150; ctx.stroke(); ctx.globalAlpha = 1;
                    }
                }
            });
            requestAnimationFrame(drawParticles);
        }

        window.addEventListener('resize', initCanvas);
        initCanvas();
        drawParticles();
    </script>
</body>
</html>
