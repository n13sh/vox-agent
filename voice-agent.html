<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Santamonica Voice Agent | Your Global Education Partner</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #0a1628;
            --navy-light: #162a44;
            --gold: #FFD700;
            --gold-hover: #e6c200;
            --white: #ffffff;
            --grey: #a0aec0;
            --red: #ef4444;
            --green: #10b981;
            --blue: #3b82f6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--navy);
            color: var(--white);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* Top Bar */
        .header {
            padding: 1.5rem 2rem;
            background: rgba(10, 22, 40, 0.9);
            border-bottom: 2px solid var(--gold);
            text-align: center;
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo-text {
            font-size: 2rem;
            font-weight: 700;
            color: var(--white);
            letter-spacing: 1px;
        }

        .logo-text span {
            color: var(--gold);
        }

        .tagline {
            font-size: 0.9rem;
            color: var(--gold);
            font-weight: 300;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 0.25rem;
        }

        /* Settings Panel */
        .settings-container {
            max-width: 600px;
            margin: 2rem auto;
            padding: 1.5rem;
            background: var(--navy-light);
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 215, 0, 0.2);
        }

        .input-group {
            margin-bottom: 1rem;
        }

        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
            color: var(--gold);
            font-weight: 600;
        }

        .input-group input {
            width: 100%;
            padding: 0.75rem;
            background: var(--navy);
            border: 1px solid var(--grey);
            border-radius: 6px;
            color: var(--white);
            outline: none;
            transition: border-color 0.3s;
        }

        .input-group input:focus {
            border-color: var(--gold);
        }

        .start-btn {
            width: 100%;
            padding: 0.75rem;
            background: var(--gold);
            color: var(--navy);
            border: none;
            border-radius: 6px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1rem;
        }

        .start-btn:hover:not(:disabled) {
            background: var(--gold-hover);
            transform: translateY(-2px);
        }

        .start-btn:disabled {
            background: var(--grey);
            cursor: not-allowed;
            opacity: 0.6;
        }

        /* Interaction Area */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
        }

        .mic-button-container {
            position: relative;
            margin-bottom: 1.5rem;
        }

        .mic-button {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: var(--grey);
            border: none;
            outline: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 5;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .mic-button svg {
            width: 60px;
            height: 60px;
            fill: var(--navy);
        }

        /* States */
        .mic-button.idle {
            background: var(--grey);
        }

        .mic-button.listening {
            background: var(--green);
        }

        .mic-button.speaking {
            background: var(--blue);
            box-shadow: 0 0 30px var(--blue);
        }

        /* Animation Rings */
        .ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 2px solid var(--green);
            opacity: 0;
            pointer-events: none;
        }

        .mic-button.listening~.ring {
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% {
                width: 150px;
                height: 150px;
                opacity: 0.8;
            }

            100% {
                width: 220px;
                height: 220px;
                opacity: 0;
            }
        }

        .status-text {
            font-size: 1.2rem;
            font-weight: 400;
            margin-bottom: 2rem;
            color: var(--white);
            text-align: center;
        }

        /* Transcript Panel */
        .transcript-container {
            width: 100%;
            height: 300px;
            background: rgba(22, 42, 68, 0.5);
            border-radius: 12px;
            padding: 1.5rem;
            overflow-y: auto;
            margin-bottom: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .message {
            max-width: 80%;
            padding: 0.75rem 1rem;
            border-radius: 12px;
            font-size: 0.95rem;
            line-height: 1.4;
        }

        .message.agent {
            align-self: flex-start;
            background: var(--white);
            color: var(--navy);
            border-bottom-left-radius: 2px;
        }

        .message.user {
            align-self: flex-end;
            background: var(--gold);
            color: var(--navy);
            border-bottom-right-radius: 2px;
        }

        /* Waveform */
        .waveform-container {
            display: none;
            align-items: center;
            justify-content: center;
            gap: 4px;
            height: 40px;
            margin-bottom: 1.5rem;
        }

        .waveform-bar {
            width: 4px;
            height: 10px;
            background: var(--blue);
            border-radius: 2px;
            animation: wave 1s ease-in-out infinite;
        }

        @keyframes wave {

            0%,
            100% {
                height: 10px;
            }

            50% {
                height: 35px;
            }
        }

        .mic-button.speaking~.waveform-container {
            display: flex;
        }

        /* Controls Area */
        .controls-area {
            display: flex;
            gap: 1rem;
            width: 100%;
            justify-content: center;
        }

        .end-btn {
            display: none;
            padding: 0.6rem 1.5rem;
            background: var(--red);
            color: var(--white);
            border: none;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .end-btn:hover {
            transform: scale(1.05);
        }

        .copy-btn {
            display: none;
            padding: 0.6rem 1.5rem;
            background: transparent;
            color: var(--gold);
            border: 1px solid var(--gold);
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .copy-btn:hover {
            background: rgba(255, 215, 0, 0.1);
        }

        /* Footer */
        .footer {
            padding: 1.5rem;
            text-align: center;
            border-top: 1px solid rgba(255, 215, 0, 0.1);
            font-size: 0.85rem;
            color: var(--grey);
            background: var(--navy);
        }

        .footer a {
            color: var(--gold);
            text-decoration: none;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .header {
                padding: 1rem;
            }

            .logo-text {
                font-size: 1.5rem;
            }

            .mic-button {
                width: 120px;
                height: 120px;
            }

            .settings-container {
                margin: 1rem;
            }
        }

        /* Error Toast */
        .error-toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            background: var(--red);
            color: var(--white);
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            display: none;
            z-index: 1000;
        }
    </style>
</head>

<body>

    <header class="header">
        <h1 class="logo-text">SANTAMONICA <span>STUDY ABROAD</span></h1>
        <p class="tagline">Your Global Education Partner</p>
    </header>

    <div id="settings" class="settings-container">
        <div class="input-group" style="display: none;">
            <label for="apiKey">ElevenLabs API Key</label>
            <input type="password" id="apiKey" placeholder="Enter your API Key"
                value="sk_515cd33aa27c368a98b71df6df9624249ee161e5a8edce2c">
        </div>
        <div class="input-group">
            <label for="agentId">Agent ID</label>
            <input type="text" id="agentId" placeholder="Enter your Agent ID"
                value="agent_6101kkdmyfwmf0sap11vr8jxktbk">
        </div>
        <button id="startSession" class="start-btn">Start Session</button>
    </div>

    <main class="main-content">
        <div class="mic-button-container">
            <button id="micBtn" class="mic-button idle" disabled>
                <svg viewBox="0 0 24 24">
                    <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z" />
                    <path
                        d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z" />
                </svg>
            </button>
            <div class="ring"></div>
            <div class="ring" style="animation-delay: 0.5s"></div>
        </div>

        <p id="status" class="status-text">Enter details to start</p>

        <div id="waveform" class="waveform-container">
            <div class="waveform-bar" style="animation-duration: 0.8s"></div>
            <div class="waveform-bar" style="animation-duration: 1.1s"></div>
            <div class="waveform-bar" style="animation-duration: 0.9s"></div>
            <div class="waveform-bar" style="animation-duration: 1.2s"></div>
            <div class="waveform-bar" style="animation-duration: 1.0s"></div>
        </div>

        <div id="transcript" class="transcript-container">
            <!-- Messages will appear here -->
        </div>

        <div class="controls-area">
            <button id="endBtn" class="end-btn">End Call</button>
            <button id="copyBtn" class="copy-btn">Copy Transcript</button>
        </div>
    </main>

    <footer class="footer">
        <p>+91 9645222999 | info@santamonicaedu.in | <a href="https://santamonicaedu.in"
                target="_blank">santamonicaedu.in</a></p>
    </footer>

    <div id="errorToast" class="error-toast"></div>

    <script>
        const API_KEY_INPUT = document.getElementById('apiKey');
        const AGENT_ID_INPUT = document.getElementById('agentId');
        const START_BTN = document.getElementById('startSession');
        const MIC_BTN = document.getElementById('micBtn');
        const END_BTN = document.getElementById('endBtn');
        const COPY_BTN = document.getElementById('copyBtn');
        const TRANSCRIPT = document.getElementById('transcript');
        const STATUS = document.getElementById('status');
        const WAVEFORM = document.getElementById('waveform');
        const ERROR_TOAST = document.getElementById('errorToast');

        let socket = null;
        let audioContext = null;
        let scriptProcessor = null;
        let micStream = null;
        let conversationStarted = false;
        let audioQueue = [];
        let isPlaying = false;
        let inactivityTimer = null;
        let reconnectAttempted = false;

        // UI Helpers
        function showError(msg) {
            ERROR_TOAST.innerText = msg;
            ERROR_TOAST.style.display = 'block';
            setTimeout(() => { ERROR_TOAST.style.display = 'none'; }, 5000);
        }

        function updateStatus(text, stateClass = 'idle') {
            STATUS.innerText = text;
            MIC_BTN.className = `mic-button ${stateClass}`;
            if (stateClass === 'speaking') {
                WAVEFORM.style.display = 'flex';
            } else {
                WAVEFORM.style.display = 'none';
            }
        }

        function addMessage(speaker, text) {
            const div = document.createElement('div');
            div.className = `message ${speaker}`;
            div.innerText = text;
            TRANSCRIPT.appendChild(div);
            TRANSCRIPT.scrollTop = TRANSCRIPT.scrollHeight;
            resetInactivityTimer();
        }

        // Session Management
        START_BTN.addEventListener('click', async () => {
            const apiKey = API_KEY_INPUT.value.trim();
            const agentId = AGENT_ID_INPUT.value.trim();

            if (!apiKey || !agentId) {
                showError('Please enter both API Key and Agent ID');
                return;
            }

            try {
                START_BTN.disabled = true;
                START_BTN.innerText = 'Connecting...';

                const response = await fetch(`https://api.elevenlabs.io/v1/convai/conversation/get-signed-url?agent_id=${agentId}`, {
                    method: 'GET',
                    headers: {
                        'xi-api-key': apiKey
                    }
                });

                if (!response.ok) throw new Error('Authentication failed. Check your API key.');

                const data = await response.json();
                startWebSocket(data.signed_url);
            } catch (err) {
                showError(err.message);
                START_BTN.disabled = false;
                START_BTN.innerText = 'Start Session';
            }
        });

        async function startWebSocket(url) {
            try {
                socket = new WebSocket(url);

                socket.onopen = () => {
                    console.log('WS Shared');
                    initMic();
                    document.getElementById('settings').style.display = 'none';
                    END_BTN.style.display = 'block';
                    updateStatus('Connecting to Mic...', 'idle');
                };

                socket.onmessage = async (event) => {
                    const msg = JSON.parse(event.data);

                    if (msg.type === 'audio') {
                        queueAudio(msg.audio);
                    } else if (msg.type === 'transcript') {
                        addMessage(msg.speaker, msg.text);
                    } else if (msg.type === 'agent_response') {
                        // Optional handling
                    } else if (msg.type === 'ping') {
                        socket.send(JSON.stringify({ type: 'pong' }));
                    }
                };

                socket.onclose = () => {
                    if (conversationStarted && !reconnectAttempted) {
                        reconnectAttempted = true;
                        // Simple reconnection logic could go here
                        console.log('Socket closed unexpectedly');
                    }
                    endSession();
                };

                socket.onerror = (err) => {
                    showError('Connection error. Please try again.');
                    endSession();
                };

            } catch (err) {
                showError('WebSocket failed: ' + err.message);
            }
        }

        async function initMic() {
            try {
                micStream = await navigator.mediaDevices.getUserMedia({
                    audio: { sampleRate: 16000, channelCount: 1 }
                });

                audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
                const source = audioContext.createMediaStreamSource(micStream);

                // Use ScriptProcessor for max compatibility in a single file without separate worker file
                scriptProcessor = audioContext.createScriptProcessor(4096, 1, 1);

                scriptProcessor.onaudioprocess = (e) => {
                    if (!socket || socket.readyState !== WebSocket.OPEN) return;

                    const inputData = e.inputBuffer.getChannelData(0);
                    const pcmData = convertFloat32ToInt16(inputData);
                    const base64 = b64encode(pcmData);

                    socket.send(JSON.stringify({
                        user_audio_chunk: base64
                    }));
                };

                source.connect(scriptProcessor);
                scriptProcessor.connect(audioContext.destination);

                conversationStarted = true;
                updateStatus('Listening...', 'listening');
                resetInactivityTimer();
            } catch (err) {
                showError('Mic access denied. Please allow microphone permissions.');
                endSession();
            }
        }

        // Audio Conversion Helpers
        function convertFloat32ToInt16(buffer) {
            let l = buffer.length;
            let buf = new Int16Array(l);
            while (l--) {
                buf[l] = Math.min(1, buffer[l]) * 0x7FFF;
            }
            return buf.buffer;
        }

        function b64encode(buf) {
            let binary = '';
            let bytes = new Uint8Array(buf);
            for (let i = 0; i < bytes.byteLength; i++) {
                binary += String.fromCharCode(bytes[i]);
            }
            return window.btoa(binary);
        }

        // Audio Playback Queue
        function queueAudio(base64) {
            const binary = atob(base64);
            const bytes = new Uint8Array(binary.length);
            for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);

            audioQueue.push(bytes.buffer);
            if (!isPlaying) playNext();
        }

        async function playNext() {
            if (audioQueue.length === 0) {
                isPlaying = false;
                if (conversationStarted) updateStatus('Listening...', 'listening');
                return;
            }

            isPlaying = true;
            updateStatus('Agent Speaking...', 'speaking');

            const buffer = audioQueue.shift();
            const int16 = new Int16Array(buffer);
            const float32 = new Float32Array(int16.length);
            for (let i = 0; i < int16.length; i++) float32[i] = int16[i] / 32768.0;

            const audioBuf = audioContext.createBuffer(1, float32.length, 16000);
            audioBuf.getChannelData(0).set(float32);

            const source = audioContext.createBufferSource();
            source.buffer = audioBuf;
            source.connect(audioContext.destination);
            source.onended = playNext;
            source.start();
        }

        function resetInactivityTimer() {
            clearTimeout(inactivityTimer);
            inactivityTimer = setTimeout(() => {
                showError('Session timed out due to inactivity.');
                endSession();
            }, 300000); // 5 minutes
        }

        function endSession() {
            conversationStarted = false;
            if (socket) socket.close();
            if (micStream) micStream.getTracks().forEach(t => t.stop());
            if (audioContext) audioContext.close();

            updateStatus('Session Ended', 'idle');
            END_BTN.style.display = 'none';
            COPY_BTN.style.display = 'block';
            START_BTN.disabled = false;
            START_BTN.innerText = 'Restart Session';
        }

        END_BTN.addEventListener('click', endSession);

        COPY_BTN.addEventListener('click', () => {
            const text = Array.from(TRANSCRIPT.children)
                .map(m => `${m.classList.contains('agent') ? 'Agent' : 'User'}: ${m.innerText}`)
                .join('\n');

            navigator.clipboard.writeText(text).then(() => {
                const originalText = COPY_BTN.innerText;
                COPY_BTN.innerText = 'Copied!';
                setTimeout(() => { COPY_BTN.innerText = originalText; }, 2000);
            });
        });

    </script>
</body>

</html>
